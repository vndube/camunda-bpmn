spring:
  application:
    name: fd-job-worker
  threads.virtual.enabled: true

# ── Camunda Zeebe ──────────────────────────────────────────────────────────
zeebe:
  client:
    broker:
      gateway-address: ${ZEEBE_GATEWAY_ADDRESS:localhost:26500}
    security:
      plaintext: true
    worker:
      default-name: fd-job-worker
      default-max-jobs-active: 32
      default-job-timeout: PT30S
      default-poll-interval: PT100MS

# ── AWS S3 ─────────────────────────────────────────────────────────────────
aws:
  s3:
    bucket-name: ${S3_FD_PAYLOAD_BUCKET:fd-payload-bucket}
    region: ${AWS_REGION:ap-south-1}
    prefix: fd-requests/

# ── FD Domain Service ──────────────────────────────────────────────────────
fd-domain:
  base-url: ${FD_DOMAIN_SERVICE_URL:http://fd-domain-service:8082}
  timeout-seconds: 20
  connect-timeout-seconds: 5

logging:
  level:
    com.bank: DEBUG
    io.camunda.zeebe: INFO

