spring:
  application:
    name: fd-domain-service
  webflux:
    base-path: /internal

server:
  port: 8082

# ── AWS S3 ─────────────────────────────────────────────────────────────────
aws:
  s3:
    bucket-name: ${S3_FD_PAYLOAD_BUCKET:fd-payload-bucket}
    region: ${AWS_REGION:ap-south-1}
    prefix: fd-requests/

# ── CBS Adapter ────────────────────────────────────────────────────────────
cbs:
  base-url: ${CBS_BASE_URL:http://cbs-host:9090}
  timeout-seconds: 25
  connect-timeout-seconds: 5
  channel-id: DBP
  auth:
    client-id: ${CBS_CLIENT_ID:dbp-client}
    client-secret: ${CBS_CLIENT_SECRET:}

# ── DBP Application State DB ───────────────────────────────────────────────
spring.r2dbc:
  url: ${DB_URL:r2dbc:postgresql://localhost:5432/fddb}
  username: ${DB_USER:bwgdbuser}
  password: ${DB_PASS:bwgdbpass}
  hikari:
    maximum-pool-size: 10
    minimum-idle: 2

# ── Logging ────────────────────────────────────────────────────────────────
logging:
  level:
    com.bank: DEBUG
