spring:
  application:
    name: mobile-bff
  webflux:
    base-path: /api/v1

server:
  port: 8080

# ── Camunda Zeebe ──────────────────────────────────────────────────────────
zeebe:
  client:
    broker:
      gateway-address: ${ZEEBE_GATEWAY_ADDRESS:localhost:26500}
    security:
      plaintext: true                    # set false + provide certs in prod
    request-timeout: PT10S

# ── Camunda Operate (for process instance search & status) ─────────────────
camunda:
  operate:
    base-url: ${CAMUNDA_OPERATE_URL:http://localhost:8081}
    username: ${CAMUNDA_OPERATE_USERNAME:demo}
    password: ${CAMUNDA_OPERATE_PASSWORD:demo}

# ── AWS S3 ─────────────────────────────────────────────────────────────────
aws:
  s3:
    bucket-name: ${S3_FD_PAYLOAD_BUCKET:fd-payload-bucket}
    region: ${AWS_REGION:ap-south-1}
    prefix: fd-requests/               # s3 key: fd-requests/{applicationId}.json
  credentials:
    access-key: ${AWS_ACCESS_KEY_ID:}
    secret-key: ${AWS_SECRET_ACCESS_KEY:}

# ── FD Domain Service ──────────────────────────────────────────────────────
fd-domain:
  base-url: ${FD_DOMAIN_SERVICE_URL:http://fd-domain-service:8082}
  timeout-seconds: 15

# ── Logging ────────────────────────────────────────────────────────────────
logging:
  level:
    com.bank: DEBUG
    io.camunda.zeebe: INFO
